databases:
  - name: codevector-db
    plan: free
    databaseName: codevector
    region: oregon
    ipAllowList: []

services:
  # FastAPI Backend
  - type: web
    name: codevector-backend
    plan: free
    runtime: python
    region: oregon
    buildCommand: |
      cd backend && pip install --upgrade pip && pip install -r requirements.txt
    startCommand: cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: DATABASE_URL
        fromDatabase:
          name: codevector-db
          property: connectionString
      - key: LOG_LEVEL
        value: INFO
      - key: DEBUG
        value: "false"
    autoDeploy: true
    healthCheckPath: /health

  # Next.js Frontend
  - type: web
    name: codevector-frontend
    plan: free
    runtime: node
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://codevector-backend.onrender.com
    autoDeploy: true
    healthCheckPath: /
